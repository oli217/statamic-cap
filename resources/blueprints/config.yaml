tabs:
  main:
    display: Cap
    sections:
      -
        fields:
          -
            handle: endpoint
            field:
              type: text
              display: "Cap Endpoint URL"
              instructions: "Full URL of your self-hosted Cap instance, including the site key. Example: https://cap.example.com/your-site-key/"
              validate: required
          -
            handle: secret
            field:
              type: text
              display: "Secret Key"
              instructions: "The secret key generated in your Cap dashboard. Never expose this on the client side."
              validate: required
          -
            handle: token_field
            field:
              type: text
              display: "Token Field Name"
              instructions: "The name of the hidden field injected by the Cap widget into the parent form."
              default: cap-token
          -
            handle: timeout
            field:
              type: integer
              display: "Timeout (seconds)"
              instructions: "Time in seconds before abandoning the request to /siteverify."
              default: 5
          -
            handle: fail_open
            field:
              type: toggle
              display: "Fail Open"
              instructions: "When enabled, any communication error with the Cap instance (network, timeout, 5xx) lets the request through rather than blocking it. An explicitly invalid token is always rejected."
              default: false
